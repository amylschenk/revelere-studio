<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Revelere</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #1c1814; }
    #viewer { width: 100%; height: 100%; border: none; display: block; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #1c1814;
      font-family: 'Georgia', serif; color: #A67C52; gap: 16px;
      transition: opacity 0.4s;
    }
    #loading-word { font-size: 22px; letter-spacing: 0.22em; }
    #loading-dot  { font-size: 11px; color: #5a4a38; letter-spacing: 0.18em; animation: pulse 1.4s ease-in-out infinite; }
    #error { display: none; position: fixed; inset: 0; align-items: center; justify-content: center; background: #1c1814; color: #8A7E70; font-family: Georgia, serif; font-size: 15px; text-align: center; }
    @keyframes pulse { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
  </style>
</head>
<body>

<div id="loading">
  <div id="loading-word">Revelere</div>
  <div id="loading-dot">loading your design book</div>
</div>

<div id="error">
  <div>
    <div style="font-size:13px;margin-bottom:8px;">This link could not be found.</div>
    <div style="font-size:11px;color:#5a4a38;">It may have expired or the address is incorrect.</div>
  </div>
</div>

<iframe id="viewer" style="opacity:0;transition:opacity 0.5s;"></iframe>

<script>
  (function () {
    var t = new URLSearchParams(location.search).get('t');
    if (!t) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
      return;
    }

    var frame = document.getElementById('viewer');

    frame.onload = function () {
      document.getElementById('loading').style.opacity = '0';
      setTimeout(function () {
        document.getElementById('loading').style.display = 'none';
        frame.style.opacity = '1';
      }, 400);
    };

    frame.onerror = function () {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
    };

    frame.src = '/api/share?t=' + encodeURIComponent(t);
  })();
</script>

</body>
</html>
